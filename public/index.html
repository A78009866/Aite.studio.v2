<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aite.studio - Flutter to APK Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00e676;
            --primary-dark: #00c853;
            --bg: #0a0a0a;
            --card: #141414;
            --card-hover: #1a1a1a;
            --border: #222;
            --text: #fff;
            --text-muted: #888;
            --danger: #ff4444;
            --info: #2196F3;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Background Effect */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(0,230,118,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 70% 50%, rgba(33,150,243,0.02) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-2%, -2%); }
        }

        /* Language Toggle */
        .lang-toggle {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
            display: flex;
            gap: 5px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }

        .lang-btn {
            padding: 6px 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: #000;
        }

        /* Auth Area */
        .auth-area {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .auth-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .auth-btn:hover { border-color: var(--primary); }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--primary);
        }

        /* Nav */
        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            text-align: center;
        }

        nav .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        nav .logo-icon {
            width: 36px;
            height: 36px;
        }

        nav .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--info));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Container */
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 30px 20px 60px;
        }

        /* Title */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .page-title h1 i { color: var(--info); }

        .page-title p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Card */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }

        .form-group input[type="text"]:focus {
            border-color: var(--primary);
        }

        /* Upload Type Selector */
        .upload-type-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }

        .upload-type-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .upload-type-btn:hover { border-color: var(--primary); color: var(--text); }

        .upload-type-btn.active {
            background: rgba(0,230,118,0.1);
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Drop Zone */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: var(--primary);
            background: rgba(0,230,118,0.05);
        }

        .drop-zone i {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .drop-zone .text-main {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
        }

        .drop-zone .text-sub {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .drop-zone.has-files {
            border-color: var(--primary);
            background: rgba(0,230,118,0.05);
        }

        /* File Info */
        .file-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .file-info i { color: var(--primary); font-size: 1.2rem; }
        .file-info .name { flex: 1; font-size: 0.85rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-info .size { font-size: 0.8rem; color: var(--text-muted); }

        /* Icon Area */
        .icon-upload-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            border: 2px dashed var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            flex-shrink: 0;
            transition: border 0.2s;
        }

        .icon-preview:hover { border-color: var(--primary); }

        .icon-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .icon-preview i {
            font-size: 1.5rem;
            color: var(--text-muted);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: #000;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,230,118,0.3); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .submit-btn.loading { pointer-events: none; }

        /* Status Area */
        .status-container {
            display: none;
            margin-top: 20px;
        }

        .progress-bar-wrapper {
            width: 100%;
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--info));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .status-label {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Result Area */
        .result-card {
            background: rgba(0,230,118,0.08);
            border: 1px solid var(--primary);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .result-card h3 {
            color: var(--text);
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 30px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.2s;
        }

        .download-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        /* Error Result */
        .error-card {
            background: rgba(255,68,68,0.08);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }

        .error-card h3 { color: var(--danger); margin-bottom: 8px; }
        .error-card p { color: var(--text-muted); font-size: 0.9rem; }

        /* My Apps Section */
        .apps-section {
            margin-top: 30px;
        }

        .apps-section h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .apps-section h2 i { color: var(--primary); }

        .app-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: border 0.2s;
        }

        .app-item:hover { border-color: var(--primary); }

        .app-item img {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
        }

        .app-item .info { flex: 1; overflow: hidden; }
        .app-item .info h4 { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-item .info p { font-size: 0.8rem; color: var(--text-muted); }

        .app-item a {
            color: var(--primary);
            font-size: 1.2rem;
            padding: 5px;
        }

        .empty-apps {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 20px 15px 40px; }
            .page-title h1 { font-size: 1.4rem; }
            .upload-type-selector { flex-direction: column; }
        }
    </style>
</head>
<body>
    <!-- Language Toggle -->
    <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLanguage('ar')" id="langAr">AR</button>
        <button class="lang-btn" onclick="setLanguage('en')" id="langEn">EN</button>
    </div>

    <!-- Auth Area -->
    <div class="auth-area" id="authArea">
        <button class="auth-btn" onclick="signInGoogle()" id="authBtn">
            <i class="fa-brands fa-google"></i> <span id="t_signin">تسجيل الدخول</span>
        </button>
    </div>

    <!-- Nav -->
    <nav>
        <div class="logo">
            <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" rx="20" fill="url(#g1)"/>
                <path d="M50 20L80 40V70L50 90L20 70V40L50 20Z" fill="rgba(255,255,255,0.15)"/>
                <path d="M50 30L70 42V66L50 78L30 66V42L50 30Z" fill="rgba(0,230,118,0.3)"/>
                <text x="50" y="62" text-anchor="middle" fill="white" font-size="28" font-weight="bold" font-family="Arial">A</text>
                <defs><linearGradient id="g1" x1="0" y1="0" x2="100" y2="100"><stop stop-color="#1a1a2e"/><stop offset="1" stop-color="#0a0a0a"/></linearGradient></defs>
            </svg>
            <span class="logo-text">Aite.studio</span>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="page-title">
            <h1><i class="fa-brands fa-flutter"></i> <span id="t_title">Flutter to APK Builder</span></h1>
            <p id="t_subtitle">ارفع مشروع فلاتر (مجلد او ملف مضغوط) وحوله الى APK</p>
        </div>

        <div class="card">
            <form id="buildForm" autocomplete="off">
                <!-- App Name -->
                <div class="form-group">
                    <label id="t_appname_label">اسم التطبيق</label>
                    <input type="text" id="appName" placeholder="My Flutter App" required>
                </div>

                <!-- Package Name -->
                <div class="form-group">
                    <label id="t_pkgname_label">اسم الحزمة</label>
                    <input type="text" id="packageName" placeholder="com.example.myapp" required pattern="^[a-z][a-z0-9_]*(?:\.[a-z][a-z0-9_]*)+$">
                </div>

                <!-- App Icon -->
                <div class="form-group">
                    <label id="t_icon_label">ايقونة التطبيق</label>
                    <div class="icon-upload-area">
                        <div class="icon-preview" id="iconPreview" onclick="document.getElementById('iconInput').click()">
                            <i class="fa-solid fa-image"></i>
                        </div>
                        <div>
                            <p style="font-size:0.85rem; color:var(--text-muted);" id="t_icon_hint">PNG, 512x512 مفضل</p>
                        </div>
                        <input type="file" id="iconInput" accept="image/*" style="display:none" onchange="handleIconSelect(this)">
                    </div>
                </div>

                <!-- Upload Type -->
                <div class="form-group">
                    <label id="t_project_label">مشروع فلاتر</label>
                    <div class="upload-type-selector">
                        <button type="button" class="upload-type-btn active" onclick="setUploadType('folder')" id="btnTypeFolder">
                            <i class="fa-solid fa-folder-open"></i> <span id="t_type_folder">مجلد</span>
                        </button>
                        <button type="button" class="upload-type-btn" onclick="setUploadType('zip')" id="btnTypeZip">
                            <i class="fa-solid fa-file-zipper"></i> <span id="t_type_zip">ملف مضغوط ZIP</span>
                        </button>
                    </div>

                    <!-- Folder Upload -->
                    <div id="folderUploadArea">
                        <div class="drop-zone" id="folderDropZone" onclick="document.getElementById('folderInput').click()">
                            <i class="fa-solid fa-folder-open"></i>
                            <div class="text-main" id="t_folder_main">اختر مجلد مشروع فلاتر</div>
                            <div class="text-sub" id="t_folder_sub">يجب ان يحتوي على pubspec.yaml و مجلد lib</div>
                        </div>
                        <input type="file" id="folderInput" webkitdirectory directory multiple style="display:none" onchange="handleFolderSelect(this)">
                    </div>

                    <!-- ZIP Upload -->
                    <div id="zipUploadArea" style="display:none;">
                        <div class="drop-zone" id="zipDropZone" onclick="document.getElementById('zipInput').click()">
                            <i class="fa-solid fa-file-zipper"></i>
                            <div class="text-main" id="t_zip_main">اختر ملف ZIP لمشروع فلاتر</div>
                            <div class="text-sub" id="t_zip_sub">ملف مضغوط يحتوي على مشروع فلاتر كامل</div>
                        </div>
                        <input type="file" id="zipInput" accept=".zip,application/zip" style="display:none" onchange="handleZipSelect(this)">
                    </div>

                    <!-- File Info Display -->
                    <div id="fileInfoArea"></div>
                </div>

                <!-- Submit -->
                <button type="submit" class="submit-btn" id="submitBtn" disabled>
                    <i class="fa-solid fa-hammer" id="btnIcon"></i>
                    <span id="t_submit">بناء APK</span>
                </button>
            </form>

            <!-- Status -->
            <div class="status-container" id="statusContainer">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="status-label" id="statusLabel"></div>
            </div>

            <!-- Result -->
            <div id="resultArea"></div>
        </div>

        <!-- My Apps -->
        <div class="apps-section card" id="appsSection" style="display:none;">
            <h2><i class="fa-solid fa-mobile-screen-button"></i> <span id="t_myapps">تطبيقاتي</span></h2>
            <div id="appsGrid"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        firebase.initializeApp({
            apiKey: "AIzaSyAN-9qBeL51nwpctJw9rSQYzz1C7dDRf1E",
            authDomain: "world-3212f.firebaseapp.com",
            databaseURL: "https://world-3212f-default-rtdb.firebaseio.com",
            projectId: "world-3212f",
            storageBucket: "world-3212f.appspot.com",
            messagingSenderId: "961498857764",
            appId: "1:961498857764:web:abc123"
        });

        const auth = firebase.auth();
        const db = firebase.database();
        let currentUser = null;

        // =================================================================
        // Translations
        // =================================================================
        const translations = {
            ar: {
                signin: 'تسجيل الدخول',

                appname_label: 'اسم التطبيق',

        // =================================================================

        // =================================================================
        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            const isAr = lang === 'ar';

            document.documentElement.dir = isAr ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;

            document.getElementById('langAr').classList.toggle('active', isAr);
            document.getElementById('langEn').classList.toggle('active', !isAr);

            document.getElementById('t_signin').textContent = t.signin;
            document.getElementById('t_title').textContent = t.title;
            document.getElementById('t_subtitle').textContent = t.subtitle;
            document.getElementById('t_appname_label').textContent = t.appname_label;
            document.getElementById('t_pkgname_label').textContent = t.pkgname_label;
            document.getElementById('t_icon_label').textContent = t.icon_label;
            document.getElementById('t_icon_hint').textContent = t.icon_hint;
            document.getElementById('t_project_label').textContent = t.project_label;
            document.getElementById('t_type_folder').textContent = t.type_folder;
            document.getElementById('t_type_zip').textContent = t.type_zip;
            document.getElementById('t_folder_main').textContent = t.folder_main;
            document.getElementById('t_folder_sub').textContent = t.folder_sub;
            document.getElementById('t_zip_main').textContent = t.zip_main;
            document.getElementById('t_zip_sub').textContent = t.zip_sub;
            document.getElementById('t_submit').textContent = t.submit;
            document.getElementById('t_myapps').textContent = t.myapps;
        }

        // =================================================================
        // Auth
        // =================================================================
        function signInGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(function(err) {
                console.error('Auth error:', err);
            });
        }

        auth.onAuthStateChanged(function(user) {
            currentUser = user;
            const authArea = document.getElementById('authArea');

            if (user) {
                authArea.innerHTML = '<div class="user-info">' +
                    '<img class="user-avatar" src="' + (user.photoURL || '') + '" alt="">' +
                    '<span style="font-size:0.85rem;">' + (user.displayName || user.email) + '</span>' +
                    '<button onclick="auth.signOut()" style="background:none;border:none;color:var(--danger);cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i></button>' +
                    '</div>';
                document.getElementById('appsSection').style.display = 'block';
                loadMyApps();
            } else {
                authArea.innerHTML = '<button class="auth-btn" onclick="signInGoogle()">' +
                    '<i class="fa-brands fa-google"></i> <span id="t_signin">' + translations[currentLang].signin + '</span></button>';
                document.getElementById('appsSection').style.display = 'none';
            }
        });

        // =================================================================
        // Upload Type Toggle
        // =================================================================
        function setUploadType(type) {
            currentUploadType = type;
            projectFiles = [];

            document.querySelectorAll('.upload-type-btn').forEach(function(b) { b.classList.remove('active'); });

            if (type === 'folder') {
                document.getElementById('btnTypeFolder').classList.add('active');
                document.getElementById('folderUploadArea').style.display = 'block';
                document.getElementById('zipUploadArea').style.display = 'none';
            } else {
                document.getElementById('btnTypeZip').classList.add('active');
                document.getElementById('folderUploadArea').style.display = 'none';
                document.getElementById('zipUploadArea').style.display = 'block';
            }

            document.getElementById('fileInfoArea').innerHTML = '';
            checkFormValidity();
        }

        // =================================================================
        // Icon Handling
        // =================================================================
        function handleIconSelect(input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            iconBlob = file;

            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('iconPreview').innerHTML = '<img src="' + e.target.result + '" alt="icon">';
            };
            reader.readAsDataURL(file);
            checkFormValidity();
        }

        // =================================================================
        // Folder Upload
        // =================================================================
        function handleFolderSelect(input) {
            if (!input.files || input.files.length === 0) return;

            projectFiles = Array.from(input.files);
            var t = translations[currentLang];
            var hasPubspec = projectFiles.some(function(f) {
                return f.webkitRelativePath.split('/').pop() === 'pubspec.yaml';
            });

            var infoHtml = '<div class="file-info">' +
                '<i class="fa-solid fa-folder"></i>' +
                '<span class="name">' + projectFiles.length + ' ' + t.files_selected + '</span>' +
                '<span class="size">' + (hasPubspec ? '<i class="fa-solid fa-check" style="color:var(--primary)"></i> pubspec.yaml' : '<i class="fa-solid fa-xmark" style="color:var(--danger)"></i> pubspec.yaml') + '</span>' +
                '</div>';

            document.getElementById('fileInfoArea').innerHTML = infoHtml;
            document.getElementById('folderDropZone').classList.add('has-files');
            checkFormValidity();
        }

        // =================================================================
        // ZIP Upload
        // =================================================================
        function handleZipSelect(input) {
            if (!input.files || !input.files[0]) return;

            var file = input.files[0];
            projectFiles = [file];

            var size = file.size;
            var sizeStr = size < 1024 * 1024
                ? (size / 1024).toFixed(1) + ' KB'
                : (size / (1024 * 1024)).toFixed(1) + ' MB';

            var infoHtml = '<div class="file-info">' +
                '<i class="fa-solid fa-file-zipper" style="color:var(--info)"></i>' +
                '<span class="name">' + file.name + '</span>' +
                '<span class="size">' + sizeStr + '</span>' +
                '</div>';

            document.getElementById('fileInfoArea').innerHTML = infoHtml;
            document.getElementById('zipDropZone').classList.add('has-files');
            checkFormValidity();
        }

        // =================================================================
        // Form Validation
        // =================================================================
        function checkFormValidity() {
            var appName = document.getElementById('appName').value.trim();
            var pkgName = document.getElementById('packageName').value.trim();
            var hasIcon = !!iconBlob;
            var hasFiles = projectFiles.length > 0;
            var pkgValid = /^[a-z][a-z0-9_]*(?:\.[a-z][a-z0-9_]*)+$/.test(pkgName);

            document.getElementById('submitBtn').disabled = !(appName && pkgName && pkgValid && hasIcon && hasFiles);
        }

        document.getElementById('appName').addEventListener('input', checkFormValidity);
        document.getElementById('packageName').addEventListener('input', checkFormValidity);

        // =================================================================
        // Drag & Drop
        // =================================================================
        ['folderDropZone', 'zipDropZone'].forEach(function(id) {
            var el = document.getElementById(id);
            if (!el) return;

            el.addEventListener('dragover', function(e) {
                e.preventDefault();
                el.classList.add('drag-over');
            });
            el.addEventListener('dragleave', function() {
                el.classList.remove('drag-over');
            });
            el.addEventListener('drop', function(e) {
                e.preventDefault();
                el.classList.remove('drag-over');

                if (id === 'zipDropZone' && e.dataTransfer.files.length > 0) {
                    var file = e.dataTransfer.files[0];
                    if (file.name.toLowerCase().endsWith('.zip')) {
                        document.getElementById('zipInput').files = e.dataTransfer.files;
                        handleZipSelect(document.getElementById('zipInput'));
                    }
                }
            });
        });

        // =================================================================
        // Form Submit
        // =================================================================
        document.getElementById('buildForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!iconBlob || projectFiles.length === 0) return;

            var btn = document.getElementById('submitBtn');
            var btnIcon = document.getElementById('btnIcon');
            btn.classList.add('loading');
            btn.disabled = true;
            btnIcon.className = 'fa-solid fa-circle-notch fa-spin';

            document.getElementById('statusContainer').style.display = 'block';
            document.getElementById('progressBar').style.width = '5%';
            document.getElementById('resultArea').innerHTML = '';

            var fd = new FormData();
            fd.append('appName', document.getElementById('appName').value);
            fd.append('packageName', document.getElementById('packageName').value);
            fd.append('icon', iconBlob, 'icon.png');
            fd.append('uploadType', currentUploadType);

            if (currentUploadType === 'zip') {
                fd.append('projectFiles', projectFiles[0], projectFiles[0].name);
            } else {
                projectFiles.forEach(function(file) {
                    fd.append('projectFiles', file, file.name);
                    if (file.webkitRelativePath) {
                        fd.append('relativePath_' + file.name, file.webkitRelativePath);
                    }
                });
            }

            try {
                var res = await fetch('/build-flutter', { method: 'POST', body: fd });
                var data = await res.json();
                if (data.success) {
                    startPolling(data.build_id, data.safe_app_name, data.icon_url, data.app_name, data.package_name);
                } else {
                    throw new Error(data.error || 'Build failed');
                }
            } catch (err) {
                handleError(err.message);
                btn.classList.remove('loading');
                btn.disabled = false;
                btnIcon.className = 'fa-solid fa-hammer';
            }
        });

        // =================================================================
        // Polling
        // =================================================================
        function startPolling(buildId, safeName, iconUrl, realName, pkgName) {
            var label = document.getElementById('statusLabel');
            var bar = document.getElementById('progressBar');
            var startTime = Date.now();
            var t = translations[currentLang];

            pollingInterval = setInterval(async function() {
                var elapsed = Math.floor((Date.now() - startTime) / 1000);

                if (elapsed < 20) label.innerText = t.uploading;
                else if (elapsed < 90) label.innerText = t.preparing;
                else label.innerText = t.building;

                var progress = Math.min(10 + (elapsed / 3), 90);
                bar.style.width = progress + '%';

                if (elapsed % 5 === 0) {
                    try {
                        var checkRes = await fetch('/check-status/' + buildId + '?appName=' + safeName);
                        var checkData = await checkRes.json();

                        if (checkData.completed && checkData.status === 'success') {
                            finishBuild(checkData.download_url, buildId, iconUrl, realName, pkgName);
                        } else if (checkData.completed && checkData.status === 'failed') {
                            handleError(checkData.error || 'Build failed');
                        } else if (checkData.progress) {
                            bar.style.width = Math.max(progress, checkData.progress) + '%';
                        }
                    } catch (e) {}
                }

                if (elapsed > 900) handleError('Timeout - build took too long');
            }, 1000);
        }

        function finishBuild(url, id, iconUrl, realName, pkgName) {
            clearInterval(pollingInterval);
            var bar = document.getElementById('progressBar');
            var label = document.getElementById('statusLabel');
            bar.style.width = '100%';
            label.innerText = translations[currentLang].done;

            var btn = document.getElementById('submitBtn');
            var btnIcon = document.getElementById('btnIcon');
            btn.classList.remove('loading');
            btn.disabled = false;
            btnIcon.className = 'fa-solid fa-hammer';

            var t = translations[currentLang];
            document.getElementById('resultArea').innerHTML =
                '<div class="result-card">' +
                '<h3>' + t.ready_title + '</h3>' +
                '<a href="' + url + '" class="download-btn" target="_blank">' +
                '<i class="fa-brands fa-android"></i> ' + t.download +
                '</a></div>';

            if (currentUser) {
                db.ref('users/' + currentUser.uid + '/apps').push({
                    appName: realName,
                    packageName: pkgName,
                    iconUrl: iconUrl,
                    downloadUrl: url,
                    buildId: id,
                    timestamp: Date.now()
                });
            }
        }

        function handleError(msg) {
            clearInterval(pollingInterval);
            var t = translations[currentLang];

            document.getElementById('statusLabel').innerText = '';
            document.getElementById('resultArea').innerHTML =
                '<div class="error-card">' +
                '<h3><i class="fa-solid fa-circle-xmark"></i> ' + t.error_title + '</h3>' +
                '<p>' + msg + '</p></div>';

            var btn = document.getElementById('submitBtn');
            var btnIcon = document.getElementById('btnIcon');
            btn.classList.remove('loading');
            btn.disabled = false;
            btnIcon.className = 'fa-solid fa-hammer';
        }

        // =================================================================
        // My Apps
        // =================================================================
        function loadMyApps() {
            if (!currentUser) return;
            var grid = document.getElementById('appsGrid');
            db.ref('users/' + currentUser.uid + '/apps').on('value', function(snap) {
                grid.innerHTML = '';
                var d = snap.val();
                if (d) {
                    Object.values(d).reverse().forEach(function(app) {
                        grid.innerHTML +=
                            '<div class="app-item">' +
                            '<img src="' + app.iconUrl + '" alt="">' +
                            '<div class="info"><h4>' + app.appName + '</h4><p>' + app.packageName + '</p></div>' +
                            '<a href="' + app.downloadUrl + '" target="_blank"><i class="fa-solid fa-download"></i></a>' +
                            '</div>';
                    });
                } else {
                    grid.innerHTML = '<div class="empty-apps">' + translations[currentLang].no_apps + '</div>';
                }
            });
        }

        // =================================================================
        // Init
        // =================================================================
        setLanguage('ar');
        checkFormValidity();
    </script>
</body>
</html>
